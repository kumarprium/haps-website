<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HAPS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0D2545;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:360px;text-align:center}
.card img{width:70px;height:70px;object-fit:contain;margin:0 auto .75rem;display:block}
h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:#0D2545;margin-bottom:.2rem}
p{font-size:.85rem;color:#6B7280;margin-bottom:1.5rem}
input[type=password]{width:100%;padding:.8rem;font-size:1rem;text-align:center;border:2px solid #e5e7eb;border-radius:8px;outline:none;font-family:'DM Sans',sans-serif;letter-spacing:.15em}
input[type=password]:focus{border-color:#C9922A}
button{width:100%;padding:.8rem;background:#C9922A;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.6rem;font-family:'DM Sans',sans-serif}
button:hover{background:#b5831e}
.err{color:#b91c1c;font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="card">
  <img src="/images/logo.png" alt="HAPS" onerror="this.style.display='none'"/>
  <h1>HAPS Admin</h1>
  <p>Enter your PIN to manage the website</p>
  <input type="password" id="p" placeholder="Enter PIN"/>
  <button id="btn">Login</button>
  <p class="err" id="err" style="display:none">Incorrect PIN. Please try again.</p>
</div>

<script>
var PIN = localStorage.getItem('haps_pin') || 'haps2026';

function tryLogin() {
  var val = document.getElementById('p').value;
  document.getElementById('err').style.display = 'none';
  if (val === PIN) {
    sessionStorage.setItem('haps_auth', 'yes');
    window.location.href = '/admin/panel.html';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('p').value = '';
    document.getElementById('p').focus();
  }
}

document.getElementById('btn').addEventListener('click', tryLogin);
document.getElementById('p').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryLogin();
});
</script>
</body>
</html>
