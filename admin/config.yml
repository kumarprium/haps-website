backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://myhaps.in
display_url: https://myhaps.in
logo_url: /images/logo.png

collections:

  - name: "notices"
    label: "Notices"
    label_singular: "Notice"
    folder: "_notices"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "e.g. Admissions Open for 2026-27" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "DD MMM YYYY", time_format: false }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Admission", value: "adm" }
          - { label: "Exam", value: "exam" }
          - { label: "Event", value: "event" }
          - { label: "Holiday", value: "holiday" }
          - { label: "General", value: "general" }
        default: "general"
      - label: "Campus"
        name: "campus"
        widget: "select"
        options:
          - { label: "Both Campuses", value: "both" }
          - { label: "Main Campus Only", value: "main" }
          - { label: "Poiwan Campus Only", value: "poiwan" }
        default: "both"
      - { label: "Message", name: "body", widget: "text", hint: "The notice content shown to visitors" }
      - { label: "Published", name: "published", widget: "boolean", default: true, hint: "Uncheck to hide this notice" }

  - name: "gallery"
    label: "Photo Gallery"
    label_singular: "Photo"
    folder: "_gallery"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title / Caption", name: "title", widget: "string", hint: "e.g. Annual Sports Day 2025" }
      - { label: "Photo", name: "image", widget: "image", hint: "Upload a photo (JPG or PNG)" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "DD MMM YYYY", time_format: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Events", value: "events" }
          - { label: "Sports", value: "sports" }
          - { label: "Cultural", value: "cultural" }
          - { label: "Academics", value: "academics" }
          - { label: "Campus", value: "campus" }
          - { label: "Other", value: "other" }
        default: "events"
      - { label: "Published", name: "published", widget: "boolean", default: true }

  - name: "downloads"
    label: "Downloads & Documents"
    label_singular: "Document"
    folder: "_downloads"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Document Title", name: "title", widget: "string", hint: "e.g. Holiday List 2026-27" }
      - { label: "Description", name: "description", widget: "string", hint: "Short description shown on the downloads page" }
      - { label: "File", name: "file", widget: "file", hint: "Upload a PDF document", media_folder: "/files", public_folder: "/files" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Admissions", value: "admissions" }
          - { label: "Academic", value: "academic" }
          - { label: "Circular", value: "circular" }
          - { label: "Other", value: "other" }
        default: "admissions"
      - { label: "Published", name: "published", widget: "boolean", default: true }

  - name: "settings"
    label: "School Settings"
    files:
      - label: "Contact & General Info"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - { label: "Main Campus Phone", name: "main_phone", widget: "string" }
          - { label: "Poiwan Campus Phone", name: "poiwan_phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp Number (with country code)", name: "whatsapp", widget: "string", hint: "e.g. 919931921825" }
          - { label: "Announcement Bar Text", name: "announcement", widget: "string", hint: "Text shown in the top bar on every page" }
          - { label: "Admissions Open?", name: "admissions_open", widget: "boolean", default: true }
