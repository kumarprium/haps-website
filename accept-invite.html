<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Set Your Password | HAPS Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0D2545;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .logo-wrap{text-align:center;margin-bottom:1.5rem}
    .logo-wrap img{width:72px;height:72px;object-fit:contain;margin:0 auto .75rem}
    .logo-wrap h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:#0D2545;margin-bottom:.2rem}
    .logo-wrap p{font-size:.82rem;color:#6B7280}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.82rem;font-weight:600;color:#0D2545;margin-bottom:.35rem}
    .form-group input{width:100%;padding:.75rem 1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:#0D2545;background:#F4F6F9;border:1.5px solid transparent;border-radius:8px;outline:none;transition:border-color .2s}
    .form-group input:focus{border-color:#C9922A;background:#fff}
    .btn{width:100%;padding:.85rem;background:#C9922A;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.5rem}
    .btn:hover{background:#b5831e}
    .btn:disabled{background:#ccc;cursor:not-allowed}
    .msg{margin-top:1rem;padding:.75rem 1rem;border-radius:8px;font-size:.88rem;display:none}
    .msg.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;display:block}
    .msg.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;display:block}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:.4rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .strength{height:4px;border-radius:2px;margin-top:.4rem;background:#e5e7eb;overflow:hidden}
    .strength-bar{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/images/logo.png" alt="HAPS" onerror="this.style.display='none'"/>
    <h1>Holy Angels Public School</h1>
    <p id="pageSubtitle">Set your admin password</p>
  </div>

  <div id="loadingView" style="text-align:center;padding:1rem">
    <div style="font-size:2rem;margin-bottom:.75rem">&#9203;</div>
    <p style="color:#6B7280;font-size:.9rem">Reading your invite link...</p>
  </div>

  <form id="passwordForm" style="display:none" onsubmit="setPassword(event)">
    <div class="form-group">
      <label for="pwd">New Password *</label>
      <input type="password" id="pwd" placeholder="Minimum 8 characters" oninput="checkStrength(this.value)" required/>
      <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
    </div>
    <div class="form-group">
      <label for="pwd2">Confirm Password *</label>
      <input type="password" id="pwd2" placeholder="Repeat your password" required/>
    </div>
    <button type="submit" class="btn" id="submitBtn">Set Password &amp; Login</button>
    <div class="msg" id="formMsg"></div>
  </form>

  <div id="successView" style="display:none;text-align:center;padding:1rem">
    <div style="font-size:2.5rem;margin-bottom:.75rem">&#9989;</div>
    <h3 style="font-family:'Playfair Display',serif;color:#0D2545;margin-bottom:.5rem">Password Set!</h3>
    <p style="color:#6B7280;font-size:.9rem;margin-bottom:1.25rem">Taking you to the admin panel...</p>
    <a href="/admin/" class="btn" style="text-decoration:none;display:inline-block;width:auto;padding:.75rem 1.5rem">Go to Admin Panel &#8594;</a>
  </div>

  <div id="errorView" style="display:none;text-align:center;padding:1rem">
    <div style="font-size:2.5rem;margin-bottom:.75rem">&#9888;</div>
    <h3 style="font-family:'Playfair Display',serif;color:#0D2545;margin-bottom:.5rem">Link Expired</h3>
    <p style="color:#6B7280;font-size:.9rem;margin-bottom:1.25rem">This invite link has expired or already been used. Please ask for a new invite.</p>
    <a href="/" class="btn" style="text-decoration:none;display:inline-block;width:auto;padding:.75rem 1.5rem">Back to Website</a>
  </div>
</div>

<script>
  var token = null;
  var tokenType = null;

  // Parse hash params
  function getHashParams() {
    var hash = window.location.hash.replace('#','');
    var params = {};
    hash.split('&').forEach(function(p){
      var parts = p.split('=');
      if(parts.length === 2) params[parts[0]] = decodeURIComponent(parts[1]);
    });
    return params;
  }

  // On load - check for token
  window.addEventListener('load', function() {
    var params = getHashParams();
    
    if (params.invite_token) {
      token = params.invite_token;
      tokenType = 'invite';
      document.getElementById('pageSubtitle').textContent = 'Create your admin password';
      show('passwordForm');
    } else if (params.recovery_token) {
      token = params.recovery_token;
      tokenType = 'recovery';
      document.getElementById('pageSubtitle').textContent = 'Reset your password';
      show('passwordForm');
    } else if (params.access_token) {
      // Already logged in via token
      token = params.access_token;
      show('successView');
      setTimeout(function(){ window.location.href = '/admin/'; }, 1500);
    } else {
      // No token - check if coming from a Netlify invite email directly
      // Try to extract from full URL
      var fullUrl = window.location.href;
      var inviteMatch = fullUrl.match(/invite_token=([^&\s]+)/);
      var recoveryMatch = fullUrl.match(/recovery_token=([^&\s]+)/);
      if (inviteMatch) {
        token = inviteMatch[1];
        tokenType = 'invite';
        show('passwordForm');
      } else if (recoveryMatch) {
        token = recoveryMatch[1];
        tokenType = 'recovery';
        show('passwordForm');
      } else {
        show('errorView');
      }
    }
  });

  function show(id) {
    ['loadingView','passwordForm','successView','errorView'].forEach(function(v){
      document.getElementById(v).style.display = v === id ? 'block' : 'none';
    });
  }

  function checkStrength(val) {
    var bar = document.getElementById('strengthBar');
    var score = 0;
    if (val.length >= 8) score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    var colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    bar.style.width = (score * 25) + '%';
    bar.style.background = colors[score - 1] || '#e5e7eb';
  }

  function setPassword(e) {
    e.preventDefault();
    var pwd = document.getElementById('pwd').value;
    var pwd2 = document.getElementById('pwd2').value;
    var msg = document.getElementById('formMsg');
    var btn = document.getElementById('submitBtn');

    msg.className = 'msg';
    msg.style.display = 'none';

    if (pwd.length < 8) {
      msg.textContent = 'Password must be at least 8 characters.';
      msg.className = 'msg error';
      return;
    }
    if (pwd !== pwd2) {
      msg.textContent = 'Passwords do not match.';
      msg.className = 'msg error';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Setting password...';

    // Call Netlify Identity API directly
    var endpoint = tokenType === 'recovery'
      ? '/.netlify/identity/recover'
      : '/.netlify/identity/verify';

    fetch('/.netlify/identity/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: pwd, type: tokenType || 'signup' })
    })
    .then(function(res) {
      if (!res.ok) throw new Error('API error: ' + res.status);
      return res.json();
    })
    .then(function(data) {
      if (data.access_token) {
        // Store the token for admin use
        localStorage.setItem('gotrue.access.token', JSON.stringify({
          access_token: data.access_token,
          token_type: 'bearer',
          expires_in: data.expires_in,
          refresh_token: data.refresh_token
        }));
      }
      show('successView');
      setTimeout(function(){ window.location.href = '/admin/'; }, 2000);
    })
    .catch(function(err) {
      console.error(err);
      btn.disabled = false;
      btn.innerHTML = 'Set Password &amp; Login';
      msg.textContent = 'Something went wrong. Your invite link may have expired. Please request a new invite.';
      msg.className = 'msg error';
    });
  }
</script>
</body>
</html>
