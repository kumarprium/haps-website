<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HAPS Admin Access</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#0D2545;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(13,37,69,.4)}
    .logo{width:80px;height:80px;margin:0 auto 1.25rem;object-fit:contain}
    h1{font-size:1.3rem;color:#0D2545;margin-bottom:.4rem}
    p{font-size:.9rem;color:#6B7280;margin-bottom:1.5rem;line-height:1.6}
    .spinner{width:36px;height:36px;border:3px solid #f3f3f3;border-top:3px solid #C9922A;border-radius:50%;animation:spin 1s linear infinite;margin:1rem auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status{font-size:.85rem;color:#C9922A;font-weight:600;margin-top:.75rem}
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/images/logo.png" alt="HAPS Logo" onerror="this.style.display='none'"/>
    <h1>Holy Angels Public School</h1>
    <p>Setting up your admin access.<br/>Please wait a moment...</p>
    <div class="spinner"></div>
    <div class="status" id="status">Verifying your invitation...</div>
  </div>

  <script>
    // Extract token from URL hash
    function getHashParam(key) {
      var hash = window.location.hash.substring(1);
      var params = {};
      hash.split('&').forEach(function(part) {
        var item = part.split('=');
        params[decodeURIComponent(item[0])] = decodeURIComponent(item[1] || '');
      });
      return params[key];
    }

    var inviteToken    = getHashParam('invite_token');
    var recoveryToken  = getHashParam('recovery_token');
    var confirmToken   = getHashParam('confirmation_token');

    document.getElementById('status').textContent =
      inviteToken   ? 'Invite found — opening signup...' :
      recoveryToken ? 'Recovery link found — opening reset...' :
      confirmToken  ? 'Confirming your account...' :
      'Loading admin panel...';

    // Wait for Identity widget to initialise then open the correct dialog
    window.netlifyIdentity.on('init', function() {
      if (inviteToken) {
        window.netlifyIdentity.open('signup');
      } else if (recoveryToken) {
        window.netlifyIdentity.open('recovery');
      } else if (confirmToken) {
        window.netlifyIdentity.open('confirm');
      } else {
        // No token — just go to admin
        window.location.href = '/admin/';
      }
    });

    // Once logged in, go straight to admin
    window.netlifyIdentity.on('login', function() {
      document.getElementById('status').textContent = 'Success! Redirecting to admin...';
      setTimeout(function() {
        window.location.href = '/admin/';
      }, 800);
    });
  </script>
</body>
</html>
