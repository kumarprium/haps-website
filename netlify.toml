# Page redirects (clean URLs)
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/academics"
  to = "/academics.html"
  status = 200

[[redirects]]
  from = "/campuses"
  to = "/campuses.html"
  status = 200

[[redirects]]
  from = "/admissions"
  to = "/admissions.html"
  status = 200

[[redirects]]
  from = "/notices"
  to = "/notices.html"
  status = 200

[[redirects]]
  from = "/downloads"
  to = "/downloads.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 200

[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 200

# CMS headers
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
